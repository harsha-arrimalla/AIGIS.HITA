# ─────────────────────────────────────────────────────────────────────────────
# Hita Server — Fly.io configuration
# ─────────────────────────────────────────────────────────────────────────────
# Deploy:
#   cd apps/server
#   fly launch --no-deploy       # first time only
#   fly secrets set GEMINI_API_KEY=xxx SUPABASE_URL=xxx ...
#   fly deploy --config fly.toml --dockerfile Dockerfile --build-context .:../..
# ─────────────────────────────────────────────────────────────────────────────

app = "hita-server"
primary_region = "bom"  # Mumbai — closest to Indian users

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
