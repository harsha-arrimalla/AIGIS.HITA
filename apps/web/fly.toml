# ─────────────────────────────────────────────────────────────────────────────
# Hita Web — Fly.io configuration
# ─────────────────────────────────────────────────────────────────────────────
# Deploy:
#   cd apps/web
#   fly launch --no-deploy       # first time only
#   fly deploy --config fly.toml --dockerfile Dockerfile --build-context .:../.. \
#     --build-arg NEXT_PUBLIC_SUPABASE_URL=xxx \
#     --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=xxx \
#     --build-arg NEXT_PUBLIC_API_URL=https://hita-server.fly.dev
# ─────────────────────────────────────────────────────────────────────────────

app = "hita-web"
primary_region = "bom"  # Mumbai

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
